name: 🐛 Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill out the sections below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include exact error messages and logs (use code blocks).
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag, image digest, or commit SHA where you saw this.
      placeholder: v1.2.3 / ghcr.io/knorrlabs/...@sha256:... / abc1234
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this occur?
      multiple: true
      options:
        - Linux
        - macOS
        - Windows
        - Kubernetes
        - Docker / Compose
        - Bare metal
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, config snippets, or anything else that helps.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running a supported / current version.
          required: true
